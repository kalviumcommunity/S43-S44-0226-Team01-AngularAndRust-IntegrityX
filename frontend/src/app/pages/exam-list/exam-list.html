<div class="exam-list-container">
  <h1 class="page-title">IntegrityX Exam Platform</h1>
  <h2 class="section-title">Available Exams</h2>

  @for (exam of (exams$ | async) ?? []; track exam.id) {
    <div class="exam-card">
      <h3 class="exam-title">{{ exam.title }}</h3>
      <p class="exam-duration">Duration: {{ exam.duration_minutes }} minutes</p>
      <button class="btn-start" (click)="startExam(exam.id)">
        Start Exam
      </button>
    </div>
  }
</div>
